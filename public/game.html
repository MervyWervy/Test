<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Educate — Game</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    :root {
      --blue: #0b5ed7;
      --yellow: #ffd43b;
      --dark: #020617;
      --card: #0f172a;
      --text: #e5e7eb;
    }

    * {
      box-sizing: border-box;
      font-family: "Segoe UI", sans-serif;
    }

    body {
      margin: 0;
      height: 100vh;
      background: radial-gradient(circle at top, var(--blue), var(--dark));
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text);
      text-align: center;
    }

    .card {
      background: linear-gradient(180deg, #020617, #020617);
      border-radius: 20px;
      padding: 28px;
      width: 100%;
      max-width: 520px;
      box-shadow: 0 30px 80px rgba(0,0,0,.6);
      border: 3px solid var(--yellow);
    }

    h1 {
      color: var(--yellow);
      margin-top: 0;
    }

    h2 {
      margin-bottom: 16px;
    }

    input {
      width: 100%;
      padding: 14px;
      font-size: 1rem;
      border-radius: 12px;
      border: 2px solid #1e293b;
      background: #020617;
      color: white;
      outline: none;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 14px;
      border-radius: 14px;
      border: none;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      background: var(--yellow);
      color: #000;
      transition: transform .1s ease, box-shadow .1s ease;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(0,0,0,.4);
    }

    .choice {
      background: var(--blue);
      color: white;
      margin-top: 10px;
    }

    ul {
      list-style: none;
      padding: 0;
    }

    li {
      background: #020617;
      padding: 10px;
      margin-bottom: 8px;
      border-radius: 8px;
      border-left: 4px solid var(--yellow);
    }

    .hidden {
      display: none;
    }

    .playerName {
      font-size: .9rem;
      opacity: .8;
      margin-bottom: 8px;
    }

    .podium {
      display: flex;
      justify-content: center;
      align-items: flex-end;
      gap: 20px;
      margin-top: 20px;
    }

    .podium div {
      width: 100px;
      border-radius: 12px;
      color: black;
      font-weight: bold;
      display: flex;
      justify-content: center;
      align-items: center;
      animation: riseUp 1s ease forwards;
      transform: translateY(200px);
    }

    .gold { height: 160px; background: gold; }
    .silver { height: 120px; background: silver; }
    .bronze { height: 90px; background: #cd7f32; }

    @keyframes riseUp {
      to { transform: translateY(0); }
    }

    .pop {
      animation: pop 0.4s ease;
    }

    @keyframes pop {
      0% { transform: scale(0.6); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .slide {
      animation: slideIn 0.6s ease forwards;
      transform: translateX(-40px);
      opacity: 0;
    }

    @keyframes slideIn {
      to { transform: translateX(0); opacity: 1; }
    }

    .confetti {
      position: fixed;
      width: 8px;
      height: 8px;
      background: yellow;
      top: -10px;
      animation: fall 3s linear forwards;
    }

    @keyframes fall {
      to {
        transform: translateY(100vh) rotate(720deg);
        opacity: 0;
      }
    }

    #flashOverlay {
      position: fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background: #22c55e;
      opacity:0;
      pointer-events:none;
      transition: opacity .4s ease;
      z-index:999;
    }

    .correctChoice {
      background:#22c55e !important;
      transform: scale(1.1);
      transition: all .4s ease;
    }

    .wrongChoice {
      opacity:0.2;
      transform: scale(.9);
      transition: all .4s ease;
    }
    .revealItem {
      animation: slideUp .5s ease;
      margin: 10px 0;
      font-size:18px;
    }
    .selectedChoice {
      border: 3px solid var(--yellow);
      box-shadow: 0 0 15px var(--yellow);
      transform: scale(1.05);
    }
  </style>
</head>

<body>

  <div class="card">

    <div class="playerName" id="playerName"></div>

    <div id="wait">
      <h2>Waiting for question…</h2>
    </div>

    <div id="timerBarContainer" style="height:10px; background:#1e293b; border-radius:6px; margin-bottom:15px;">
     <div id="timerBar" style="height:100%; width:100%; background:var(--yellow); border-radius:6px; transition: width 1s linear;"></div>
    </div>

    <div id="timerText" style="margin-bottom:10px;"></div>

    <div id="question" class="hidden">
      <h2 id="qText"></h2>
      <input id="answer" placeholder="Type your fake answer" />
      <button onclick="submitAnswer()">Submit</button>
    </div>

    <div id="reviewScreen" class="hidden">
      <h2>Host Review Phase</h2>
      <p style="color:var(--yellow);">Review the answers. Reject any that are lazy or inappropriate!</p>
      <ul id="reviewList"></ul>
      <button class="primary pop" onclick="approveAll()">Approve All & Start Voting</button>
    </div>

    <div id="vote" class="hidden">
      <h2>Pick the real answer</h2>
      <div id="choices"></div>
    </div>

    <div id="correctScreen" class="hidden">
      <h2>The Correct Answer Was...</h2>
      <h1 id="correctText" style="color:#22c55e;"></h1>
    </div>

    <div id="reveal" class="hidden">
      <h2>Who Fooled Who 😈</h2>
      <ul id="revealList"></ul>
      
      <div id="hostNextRoundDiv" style="margin-top: 20px;"></div>
    </div>

    <div id="final" class="hidden">
      <h2>🏆 Final Scores</h2>
      <ul id="scores"></ul>
      <button onclick="backToTitle()">Back To Title</button>
    </div>

  </div>

  <audio id="drumroll" src="drumroll.mp3"></audio>
  <div id="flashOverlay"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();

    const params = new URLSearchParams(window.location.search);
    const isHost = params.get("host") === "true";

  
    const code = params.get("code");
    const name = params.get("name");

    document.getElementById("playerName").innerText = "You are: " + name;

   
    socket.on("connect", () => {
        socket.emit("joinRoom", { code, name, isHost });
    });

    function show(id) {
      ["wait","question","vote","reveal","final","correctScreen","reviewScreen"].forEach(s => {
        const el = document.getElementById(s);
        if (el) el.classList.add("hidden");
      });

      const target = document.getElementById(id);
      if (target) target.classList.remove("hidden");
    }
    socket.off("question");

    const warning = document.getElementById("rejectWarning");
      if (warning) warning.innerHTML = "";
    socket.on("question", q => {
      const warning = document.getElementById("rejectWarning");
      if (warning) warning.remove();
      show("question");

      document.getElementById("correctText").innerText = "";
      const qText = document.getElementById("qText");
      qText.innerText = q;
      document.getElementById("answer").value = "";

      if (isHost) {
        document.getElementById("answer").style.display = "none";
        document.querySelector("#question button").style.display = "none";
        
        if (!document.getElementById("hostWaitQ")) {
          const waitMsg = document.createElement("p");
          waitMsg.id = "hostWaitQ";
          waitMsg.style.color = "var(--yellow)";
          waitMsg.innerText = "Waiting for players to submit their lies...";
          document.getElementById("question").appendChild(waitMsg);
        }
      } else {
        document.getElementById("answer").style.display = "inline-block";
        document.querySelector("#question button").style.display = "inline-block";
      }

      window.speechSynthesis.cancel();

      setTimeout(() => {
        const speech = new SpeechSynthesisUtterance(q);
        speech.rate = 1;
        speech.pitch = 1;
        speech.lang = "en-US";
        window.speechSynthesis.speak(speech);
      }, 100);
    });

    function submitAnswer() {
      const ans = document.getElementById("answer").value.trim();
      if (!ans) return;
      socket.emit("submitAnswer", { code, answer: ans });
      show("wait");
    }

    socket.on("choices", data => {
      show("vote");

      const div = document.getElementById("choices");
      div.innerHTML = "";

   
      if (isHost) {
        const hostMsg = document.createElement("h3");
        hostMsg.style.color = "var(--yellow)";
        hostMsg.innerText = "Players are currently voting. Pick your favorite funny answer to give them bonus points!";
        div.appendChild(hostMsg);

        data.list.forEach(c => {
          const item = document.createElement("div");
          item.style.padding = "10px";
          item.style.borderBottom = "1px solid #1e293b";
          item.style.display = "flex";
          item.style.justifyContent = "space-between";
          item.style.alignItems = "center";

          const textSpan = document.createElement("span");
          textSpan.textContent = c;

          const favBtn = document.createElement("button");
          favBtn.textContent = "🌟 Favorite";
          favBtn.style.width = "auto";
          favBtn.style.padding = "5px 15px";
          favBtn.style.margin = "0";

          favBtn.onclick = () => {
            socket.emit("hostFavorite", { code, choice: c });
          };

          item.appendChild(textSpan);
          item.appendChild(favBtn);
          div.appendChild(item);
        });
        return; 
      }

    socket.on("favoriteSelected", choice => {
      const div = document.getElementById("choices");
      div.querySelectorAll("div").forEach(item => {
        const span = item.querySelector("span");
        const btn = item.querySelector("button");
        
        if (span && btn) {
          if (span.textContent === choice) {
            btn.textContent = "⭐ Selected!";
            btn.style.background = "#22c55e";
            btn.style.color = "white";
          } else {
            btn.textContent = "🌟 Favorite";
            btn.style.background = "var(--yellow)";
            btn.style.color = "black";
          }
        }
      });
    });
      
    
      const canVote = data.eligibleVoters.includes(socket.id);

      if (!canVote) {
        const msg = document.createElement("p");
        msg.innerHTML = "<b style='color: #ff4444;'>You didn't answer in time!</b><br>You are disqualified from voting this round.";
        div.appendChild(msg);
      }

      data.list.forEach(c => {
        const btn = document.createElement("button");
        btn.className = "choice";
        btn.textContent = c;

    
        if (!canVote) {
          btn.disabled = true;
          btn.style.opacity = "0.5";
          btn.style.cursor = "not-allowed";
        }

        btn.onclick = () => {
          if (!canVote) return; 

          document.querySelectorAll(".choice").forEach(b => {
            b.classList.remove("selectedChoice");
          });

          btn.classList.add("selectedChoice");
          socket.emit("vote", { code, choice: c });
        };

        div.appendChild(btn);
      });
    });

    socket.on("correctAnswer", data => {

      document.querySelectorAll(".choice").forEach(btn => {
        btn.disabled = true;
      });

      const correct = data.answer;

      window.speechSynthesis.cancel();

      setTimeout(() => {
        const speech = new SpeechSynthesisUtterance(
          "The correct answer was " + correct
        );
        window.speechSynthesis.speak(speech);
      }, 100);

      const flash = document.getElementById("flashOverlay");
      flash.style.opacity = 0.6;
      setTimeout(() => flash.style.opacity = 0, 400);

      document.querySelectorAll(".choice").forEach(btn => {
       if (btn.innerText === correct) {
          btn.classList.add("correctChoice");
       } else {
          btn.classList.add("wrongChoice");
       }
      });
    });

    socket.on("reveal", reveal => {
     show("reveal");

     const container = document.getElementById("revealList");
     container.innerHTML = "";

     document.getElementById("hostNextRoundDiv").innerHTML = "";

     reveal.forEach(line => {
        const div = document.createElement("div");
        div.className = "revealItem";
        div.innerText = line;
        container.appendChild(div);
      });

    });

    socket.on("hostRevealControls", isGameOver => {
      if (!isHost) return; 

      const div = document.getElementById("hostNextRoundDiv");
      div.innerHTML = ""; 

      const btn = document.createElement("button");
      btn.className = "primary pop";
      
      if (isGameOver) {
        btn.textContent = "End Game & Show the Winners ";
      } else {
        btn.textContent = "Next Round ➡️";
      }

      btn.onclick = () => {
        btn.disabled = true;
        btn.style.opacity = "0.5";
        socket.emit("nextRound", code);
      };

      div.appendChild(btn);
    });

    socket.on("finalResults", data => {
      show("final");

   const players = Object.values(data.players)
    .sort((a,b) => b.score - a.score);

    const container = document.getElementById("scores");
    container.innerHTML = "";

   
    const drum = new Audio("https://actions.google.com/sounds/v1/drums/drum_roll.ogg");
    drum.play();

    setTimeout(() => {

      for (let i = 0; i < 80; i++) {
        const conf = document.createElement("div");
        conf.className = "confetti";
        conf.style.left = Math.random() * window.innerWidth + "px";
        conf.style.background = ["gold","blue","yellow","white"][Math.floor(Math.random()*4)];
        conf.style.animationDuration = (2 + Math.random()*2) + "s";
        document.body.appendChild(conf);
        setTimeout(() => conf.remove(), 4000);
      }

   
      const podium = document.createElement("div");
      podium.className = "podium";

      if (players[1]) {
        podium.innerHTML += `<div class="silver pop">${players[1].name}</div>`;
      }

      if (players[0]) {
        podium.innerHTML += `<div class="gold pop">${players[0].name}</div>`;
      }

      if (players[2]) {
        podium.innerHTML += `<div class="bronze pop">${players[2].name}</div>`;
      }

      container.appendChild(podium);

    
      const awards = document.createElement("div");
      awards.style.marginTop = "20px";
      awards.innerHTML = `
        <h3 class="slide">🎖 Special Awards</h3>
        <p class="slide">😈 Best Fake Artist: ${data.stats.bestFake}</p>
        <p class="slide">🧠 Smartest Player: ${data.stats.smartest}</p>
        <p class="slide">💤 Most Timeouts: ${data.stats.slowest}</p>
      `;
      container.appendChild(awards);

    }, 2000);
   });

   let totalTime = 0;

   socket.on("timerStart", data => {
    totalTime = data.duration;

    document.getElementById("timerBar").style.width = "100%";
    document.getElementById("timerBar").style.background = "var(--yellow)";
   });

   socket.on("timerTick", data => {
    const { timeLeft } = data;

    document.getElementById("timerText").innerText =
     "Time Left: " + timeLeft + "s";

    const percent = (timeLeft / totalTime) * 100;
    document.getElementById("timerBar").style.width = percent + "%";

    if (timeLeft <= 5) {
      document.getElementById("timerBar").style.background = "red";
    }
   });
   function backToTitle() {
      window.location.href = "/";
    }

    socket.on("reviewPhase", data => {
      if (!isHost) return;
      show("reviewScreen");
      
      const ul = document.getElementById("reviewList");
      ul.innerHTML = "";
      
      for (const [id, ans] of Object.entries(data.answers)) {
         const playerName = data.players[id].name;
         
         const li = document.createElement("li");
         li.style.display = "flex";
         li.style.justifyContent = "space-between";
         li.style.alignItems = "center";
         
         li.innerHTML = `<span style="text-align:left;">
            <b style="color:var(--yellow);">${playerName}</b> wrote:<br>
            <i>"${ans}"</i>
         </span>`;
         
         const rejectBtn = document.createElement("button");
         rejectBtn.textContent = "❌ Reject";
         rejectBtn.style.width = "auto";
         rejectBtn.style.padding = "5px 10px";
         rejectBtn.style.background = "red";
         rejectBtn.style.color = "white";
         rejectBtn.style.margin = "0";
         
         rejectBtn.onclick = () => {
            const reason = prompt(`Why are you rejecting ${playerName}'s answer? (e.g., 'Too obvious')`);
            if (reason !== null) {
               socket.emit("rejectAnswer", { code, playerId: id, reason });
            }
         };
         
         li.appendChild(rejectBtn);
         ul.appendChild(li);
      }
    });

    socket.on("playersWaitingForReview", () => {
       if (!isHost) {
          show("wait");
          document.querySelector("#wait h2").innerText = "Waiting for Host to review answers...";
       }
    });

    socket.on("answerRejected", reason => {
       show("question");
       
       document.getElementById("answer").value = ""; 
       
       const submitBtn = document.querySelector("#question button");
       if (submitBtn) {
           submitBtn.disabled = false;
           submitBtn.style.opacity = "1";
       }

       let warning = document.getElementById("rejectWarning");
       if (!warning) {
         warning = document.createElement("div");
         warning.id = "rejectWarning";
         warning.style.color = "#ff4444";
         warning.style.fontWeight = "bold";
         warning.style.marginBottom = "10px";
         warning.style.fontSize = "1.2rem";
         document.getElementById("question").prepend(warning);
       }
       
       warning.innerHTML = reason ? `🚨 Rejected: ${reason}` : "Your answer was rejected! Try again.";
    });

    function approveAll() {
       socket.emit("approveAnswers", code);
    }
  </script>

</body>
</html>
