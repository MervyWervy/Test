<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Educate — Game</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    :root {
      --blue: #0b5ed7;
      --yellow: #ffd43b;
      --dark: #020617;
      --card: #0f172a;
      --text: #e5e7eb;
    }

    * {
      box-sizing: border-box;
      font-family: "Segoe UI", sans-serif;
    }

    body {
      margin: 0;
      height: 100vh;
      background: radial-gradient(circle at top, var(--blue), var(--dark));
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text);
      text-align: center;
    }

    .card {
      background: linear-gradient(180deg, #020617, #020617);
      border-radius: 20px;
      padding: 28px;
      width: 100%;
      max-width: 520px;
      box-shadow: 0 30px 80px rgba(0,0,0,.6);
      border: 3px solid var(--yellow);
    }

    h1 {
      color: var(--yellow);
      margin-top: 0;
    }

    h2 {
      margin-bottom: 16px;
    }

    input {
      width: 100%;
      padding: 14px;
      font-size: 1rem;
      border-radius: 12px;
      border: 2px solid #1e293b;
      background: #020617;
      color: white;
      outline: none;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 14px;
      border-radius: 14px;
      border: none;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      background: var(--yellow);
      color: #000;
      transition: transform .1s ease, box-shadow .1s ease;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(0,0,0,.4);
    }

    .choice {
      background: var(--blue);
      color: white;
      margin-top: 10px;
    }

    ul {
      list-style: none;
      padding: 0;
    }

    li {
      background: #020617;
      padding: 10px;
      margin-bottom: 8px;
      border-radius: 8px;
      border-left: 4px solid var(--yellow);
    }

    .hidden {
      display: none;
    }

    .playerName {
      font-size: .9rem;
      opacity: .8;
      margin-bottom: 8px;
    }

    /* --- PODIUM --- */
    .podium {
      display: flex;
      justify-content: center;
      align-items: flex-end;
      gap: 20px;
      margin-top: 20px;
    }

    .podium div {
      width: 100px;
      border-radius: 12px;
      color: black;
      font-weight: bold;
      display: flex;
      justify-content: center;
      align-items: center;
      animation: riseUp 1s ease forwards;
      transform: translateY(200px);
    }

    .gold { height: 160px; background: gold; }
    .silver { height: 120px; background: silver; }
    .bronze { height: 90px; background: #cd7f32; }

    @keyframes riseUp {
      to { transform: translateY(0); }
    }

    /* --- POP ANIMATION --- */
    .pop {
      animation: pop 0.4s ease;
    }

    @keyframes pop {
      0% { transform: scale(0.6); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    /* --- SLIDE IN --- */
    .slide {
      animation: slideIn 0.6s ease forwards;
      transform: translateX(-40px);
      opacity: 0;
    }

    @keyframes slideIn {
      to { transform: translateX(0); opacity: 1; }
    }

   /* --- CONFETTI --- */
    .confetti {
      position: fixed;
      width: 8px;
      height: 8px;
      background: yellow;
      top: -10px;
      animation: fall 3s linear forwards;
    }

    @keyframes fall {
      to {
        transform: translateY(100vh) rotate(720deg);
        opacity: 0;
      }
    }

    #flashOverlay {
      position: fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background: #22c55e;
      opacity:0;
      pointer-events:none;
      transition: opacity .4s ease;
      z-index:999;
    }

    .correctChoice {
      background:#22c55e !important;
      transform: scale(1.1);
      transition: all .4s ease;
    }

    .wrongChoice {
      opacity:0.2;
      transform: scale(.9);
      transition: all .4s ease;
    }
    .revealItem {
      animation: slideUp .5s ease;
      margin: 10px 0;
      font-size:18px;
    }
    .selectedChoice {
      border: 3px solid var(--yellow);
      box-shadow: 0 0 15px var(--yellow);
      transform: scale(1.05);
    }
  </style>
</head>

<body>

  <div class="card">

    <div class="playerName" id="playerName"></div>

    <!-- WAIT -->
    <div id="wait">
      <h2>Waiting for question…</h2>
    </div>

    <div id="timerBarContainer" style="height:10px; background:#1e293b; border-radius:6px; margin-bottom:15px;">
     <div id="timerBar" style="height:100%; width:100%; background:var(--yellow); border-radius:6px; transition: width 1s linear;"></div>
    </div>

    <div id="timerText" style="margin-bottom:10px;"></div>

    <!-- QUESTION -->
    <div id="question" class="hidden">
      <h2 id="qText"></h2>
      <input id="answer" placeholder="Type your fake answer" />
      <button onclick="submitAnswer()">Submit</button>
    </div>

    <!-- VOTE -->
    <div id="vote" class="hidden">
      <h2>Pick the real answer</h2>
      <div id="choices"></div>
    </div>

    <!-- CORRECT ANSWER -->
    <div id="correctScreen" class="hidden">
      <h2>The Correct Answer Was...</h2>
      <h1 id="correctText" style="color:#22c55e;"></h1>
    </div>

    <!-- REVEAL -->
    <div id="reveal" class="hidden">
      <h2>Who Fooled Who 😈</h2>
      <ul id="revealList"></ul>
    </div>

    <!-- FINAL -->
    <div id="final" class="hidden">
      <h2>🏆 Final Scores</h2>
      <ul id="scores"></ul>
      <button onclick="backToTitle()">Back To Title</button>
    </div>

  </div>

  <audio id="drumroll" src="drumroll.mp3"></audio>
  <div id="flashOverlay"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();

    const params = new URLSearchParams(window.location.search);
    const code = params.get("code");
    const name = params.get("name");

    document.getElementById("playerName").innerText = "You are: " + name;

    socket.emit("joinRoom", { code, name });

    function show(id) {
      ["wait","question","vote","reveal","final","correctScreen"].forEach(s => {
        const el = document.getElementById(s);
        if (el) el.classList.add("hidden");
      });

      const target = document.getElementById(id);
      if (target) target.classList.remove("hidden");
    }
    socket.off("question");

    socket.on("question", q => {

      show("question");

      document.getElementById("correctText").innerText = "";
      const qText = document.getElementById("qText");
      qText.innerText = q;
      document.getElementById("answer").value = "";

      window.speechSynthesis.cancel();

      setTimeout(() => {
        const speech = new SpeechSynthesisUtterance(q);
        speech.rate = 1;
        speech.pitch = 1;
        speech.lang = "en-US";
        window.speechSynthesis.speak(speech);
      }, 100);
    });

    function submitAnswer() {
      const ans = document.getElementById("answer").value.trim();
      if (!ans) return;
      socket.emit("submitAnswer", { code, answer: ans });
      show("wait");
    }

    socket.on("choices", data => {
      show("vote");

      const div = document.getElementById("choices");
      div.innerHTML = "";
      
      // Check if THIS player is in the eligible list
      const canVote = data.eligibleVoters.includes(socket.id);

      if (!canVote) {
        const msg = document.createElement("p");
        msg.innerHTML = "<b style='color: #ff4444;'>You didn't answer in time!</b><br>You are disqualified from voting this round.";
        div.appendChild(msg);
      }

      data.list.forEach(c => {
        const btn = document.createElement("button");
        btn.className = "choice";
        btn.textContent = c;

        // Disable button if they didn't answer
        if (!canVote) {
          btn.disabled = true;
          btn.style.opacity = "0.5";
          btn.style.cursor = "not-allowed";
        }

        btn.onclick = () => {
          if (!canVote) return; // Extra safety

          document.querySelectorAll(".choice").forEach(b => {
            b.classList.remove("selectedChoice");
          });

          btn.classList.add("selectedChoice");
          socket.emit("vote", { code, choice: c });
        };

        div.appendChild(btn);
      });
    });

    socket.on("correctAnswer", data => {

      document.querySelectorAll(".choice").forEach(btn => {
        btn.disabled = true;
      });

      const correct = data.answer;

      window.speechSynthesis.cancel();

      setTimeout(() => {
        const speech = new SpeechSynthesisUtterance(
          "The correct answer was " + correct
        );
        window.speechSynthesis.speak(speech);
      }, 100);

      const flash = document.getElementById("flashOverlay");
      flash.style.opacity = 0.6;
      setTimeout(() => flash.style.opacity = 0, 400);

      document.querySelectorAll(".choice").forEach(btn => {
       if (btn.innerText === correct) {
          btn.classList.add("correctChoice");
       } else {
          btn.classList.add("wrongChoice");
       }
      });
    });

    socket.on("reveal", reveal => {

     show("reveal");

     const container = document.getElementById("revealList");
     container.innerHTML = "";

     reveal.forEach(line => {
        const div = document.createElement("div");
        div.className = "revealItem";
        div.innerText = line;
        container.appendChild(div);
      });

    });

    socket.on("finalResults", data => {
      show("final");

   const players = Object.values(data.players)
    .sort((a,b) => b.score - a.score);

    const container = document.getElementById("scores");
    container.innerHTML = "";

    // 🥁 Drumroll Sound
    const drum = new Audio("https://actions.google.com/sounds/v1/drums/drum_roll.ogg");
    drum.play();

    setTimeout(() => {

      // 🎊 Confetti
      for (let i = 0; i < 80; i++) {
        const conf = document.createElement("div");
        conf.className = "confetti";
        conf.style.left = Math.random() * window.innerWidth + "px";
        conf.style.background = ["gold","blue","yellow","white"][Math.floor(Math.random()*4)];
        conf.style.animationDuration = (2 + Math.random()*2) + "s";
        document.body.appendChild(conf);
        setTimeout(() => conf.remove(), 4000);
      }

      // 🏆 Podium
      const podium = document.createElement("div");
      podium.className = "podium";

      if (players[1]) {
        podium.innerHTML += `<div class="silver pop">${players[1].name}</div>`;
      }

      if (players[0]) {
        podium.innerHTML += `<div class="gold pop">${players[0].name}</div>`;
      }

      if (players[2]) {
        podium.innerHTML += `<div class="bronze pop">${players[2].name}</div>`;
      }

      container.appendChild(podium);

      // 🎖 Special Awards
      const awards = document.createElement("div");
      awards.style.marginTop = "20px";
      awards.innerHTML = `
        <h3 class="slide">🎖 Special Awards</h3>
        <p class="slide">😈 Best Fake Artist: ${data.stats.bestFake}</p>
        <p class="slide">🧠 Smartest Player: ${data.stats.smartest}</p>
        <p class="slide">💤 Most Timeouts: ${data.stats.slowest}</p>
      `;
      container.appendChild(awards);

    }, 2000);
   });

   let totalTime = 0;

   socket.on("timerStart", data => {
    totalTime = data.duration;

    document.getElementById("timerBar").style.width = "100%";
    document.getElementById("timerBar").style.background = "var(--yellow)";
   });

   socket.on("timerTick", data => {
    const { timeLeft } = data;

    document.getElementById("timerText").innerText =
     "Time Left: " + timeLeft + "s";

    const percent = (timeLeft / totalTime) * 100;
    document.getElementById("timerBar").style.width = percent + "%";

    if (timeLeft <= 5) {
      document.getElementById("timerBar").style.background = "red";
    }
   });
   function backToTitle() {
      socket.emit("returnToLobby", { code });
    }
   socket.on("backToTitle", () => {
      window.location.href = "/";
    });
  </script>

</body>
</html>
